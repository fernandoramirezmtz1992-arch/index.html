<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Consultoría Integral Empresarial</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #f4f6f9; 
            margin: 0; 
            padding: 0; 
            color: #333;
        }
        .container {
            max-width: 600px; 
            margin: 50px auto; 
            padding: 40px; 
            background-color: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { 
            color: #003366; 
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        /* Estilos del Formulario */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #003366;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            height: 120px;
        }
        /* Botón Dorado Elegante */
        .btn-submit {
            background-color: #d4af37;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #aa8c2c;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #005b96;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Póngase en Contacto</h1>
        <p>Déjenos sus datos y un asesor se comunicará con usted a la brevedad para brindarle una solución a la medida.</p>
        
        <!-- Formulario básico -->
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
            </div>
            
            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required placeholder="ejemplo@empresa.com">
            </div>
            
            <div class="form-group">
                <label for="mensaje">¿En qué podemos ayudarle?</label>
                <textarea id="mensaje" name="mensaje" required placeholder="Escriba aquí su consulta o requerimiento..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>

        <!-- Botón para regresar a la página principal -->
        <a href="índice.html" class="back-link">← Volver al Inicio</a>
    </div>

</body>
</html>
