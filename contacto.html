<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Consultoría Integral Empresarial</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        h1 {
            color: #003366;
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        /* Estilos del Formulario */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #003366;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            background-color: #fff;
        }
        textarea {
            resize: vertical;
            height: 120px;
        }
        /* Botón Dorado Elegante */
        .btn-submit {
            background-color: #d4af37;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #aa8c2c;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #005b96;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Póngase en Contacto</h1>
        <p>Déjenos sus datos, seleccione el tema de su interés y un asesor se comunicará con usted a la brevedad.</p>

        <!-- Formulario configurado con FormSubmit -->
        <form action="https://formsubmit.co/fernandoramirez.mtz1992@gmail.com" method="POST">
            
            <!-- Configuración para evitar captcha molesto y ordenar la llegada del correo -->
            <input type="hidden" name="_subject" value="Nuevo mensaje desde el sitio web - Consultoría">
            <input type="hidden" name="_template" value="table">

            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required placeholder="ejemplo@empresa.com">
            </div>

            <!-- Menú desplegable con los temas y servicios -->
            <div class="form-group">
                <label for="servicio">Tema o Servicio Relacionado</label>
                <select id="servicio" name="servicio_seleccionado" required>
                    <option value="" disabled selected>Seleccione una opción...</option>
                    <option value="Financiero - Impuestos">Financiero: Impuestos y Declaraciones</option>
                    <option value="Financiero - Contabilidad">Financiero: Contabilidad General</option>
                    <option value="Legal - Corporativo">Legal: Derecho Corporativo</option>
                    <option value="Legal - Corporativo">Legal: Asesoria Ley Antilavado</option>
                    <option value="Legal - Laboral">Legal: Asesoría Laboral</option>
                    <option value="Cursos y Capacitación">Cursos y Capacitación Profesional</option>
                    <option value="Otro">Otro tema / Consulta General</option>
                </select>
            </div>

            <div class="form-group">
                <label for="mensaje">Dudas más específicas o Comentarios</label>
                <textarea id="mensaje" name="mensaje" required placeholder="Escriba aquí los detalles de su requerimiento..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>

        <!-- Botón para regresar -->
        <a href="index.html" class="back-link">← Volver al Inicio</a>
    </div>

</body>
</html>
