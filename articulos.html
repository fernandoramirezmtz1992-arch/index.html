<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículos y Publicaciones</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }
        .seccion-cabecera {
            position: relative;
            height: 70vh;
            background-image: url('Imagenes/fondo-escritura-articulos.jpg'); /* Puedes cambiar o ajustar el nombre de tu imagen */
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }
        .contenido-cabecera {
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }
        .logo-cabecera {
            max-height: 80px;
            margin-bottom: 20px;
        }
        .contenido-cabecera h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .contenido-cabecera p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #ddd;
        }
        .btn-explorar {
            display: inline-block;
            padding: 12px 30px;
            background-color: #1a365d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-explorar:hover {
            background-color: #2b4c7e;
        }
        .seccion-contenido {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }
        .seccion-contenido h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #1a365d;
        }
        .seccion-contenido p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

    <header class="seccion-cabecera">
        <div class="overlay"></div>
        <div class="contenido-cabecera">
            <img src="Logo 1.png" alt="Logo" class="logo-cabecera">
            <h1>ARTÍCULOS Y REFLEXIONES</h1>
            <p>Explora nuestras publicaciones, ensayos y análisis detallados.</p>
            <a href="#contenido" class="btn-explorar">Leer Artículos</a>
        </div>
    </header>

    <main id="contenido" class="seccion-contenido">
        <h2>Próximamente</h2>
        <p>Estamos redactando contenido de alto valor y actualidad para ti. Muy pronto podrás acceder a todas las publicaciones en este espacio.</p>
    </main>

</body>
</html>
