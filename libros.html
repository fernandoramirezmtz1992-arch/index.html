<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Colección de Libros</title>
    <style>
        /* Estilos generales básicos */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* Cabecera de alto impacto */
        .seccion-cabecera {
            position: relative;
            height: 70vh;
            background-image: url('Imagenes/fondo-biblioteca-libros.jpg'); /* Reemplaza o ajusta la ruta si es necesario */
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .contenido-cabecera {
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }

        .logo-cabecera {
            max-height: 80px;
            margin-bottom: 20px;
        }

        .contenido-cabecera h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .contenido-cabecera p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #ddd;
        }

        .btn-explorar {
            display: inline-block;
            padding: 12px 30px;
            background-color: #1a365d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-explorar:hover {
            background-color: #2b4c7e;
        }

        /* Sección de contenido provisional */
        .seccion-contenido {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .seccion-contenido h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #1a365d;
        }

        .seccion-contenido p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- Cabecera Impactante -->
    <header class="seccion-cabecera">
        <div class="overlay"></div>
        <div class="contenido-cabecera">
            <img src="Logo 1.png" alt="Logo" class="logo-cabecera">
            <h1>BIBLIOTECA: NUESTRA COLECCIÓN DE LIBROS</h1>
            <p>Sumérgete en un mundo de conocimiento, historias y sabiduría.</p>
            <a href="#contenido" class="btn-explorar">Explorar Catálogo</a>
        </div>
    </header>

   <!-- Contenido con lista de libros -->
<main id="contenido" class="seccion-contenido">
    <h2>Catálogo de Libros</h2>
    
    <div class="tarjeta-libro" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 20px;">
        <h3>Guía_Normas_APA_7</h3>
        <p>Breve descripción o sinopsis del libro.</p>
        <!-- Botón para leer en linea -->
       <a href="Libros/Gu%C3%ADa_Normas_APA_7.pdf" target="_blank" class="btn-explorar">Leer Guía APA 7</a>
</main>

</body>
</html>
