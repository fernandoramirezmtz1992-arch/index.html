<!-- Contenedor principal de la botonera elegante -->
<div style="text-align: center; margin: 60px 0 40px 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">

    <!-- Botón de Google Maps -->
    <a href="https://maps.app.goo.gl/kNLUFbkkSp75gh7X8" target="_blank" style="
        display: flex; 
        align-items: center; 
        gap: 12px; 
        padding: 16px 30px; 
        background: #ffffff; 
        color: #1a2530; 
        border: 2px solid #1a2530; 
        border-radius: 8px; 
        font-family: inherit;
        font-weight: 600; 
        font-size: 16px; 
        text-decoration: none; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        transition: all 0.3s ease;
    " onmouseover="this.style.background='#1a2530'; this.style.color='#ffffff'; this.style.transform='translateY(-3px)'; this.style.boxShadow='0 8px 15px rgba(0,0,0,0.15)';" 
       onmouseout="this.style.background='#ffffff'; this.style.color='#1a2530'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0,0,0,0.05)';" >
        <span style="font-size: 20px;">📍</span> Ubicación
    </a>
