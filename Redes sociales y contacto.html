<!-- Contenedor principal de la botonera con colores elegantes -->
<div style="text-align: center; margin: 60px 0 40px 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">

    <!-- Botón de Google Maps (con el rojo característico) -->
    <a href="https://maps.app.goo.gl/kNLUFbkkSp75gh7X8" target="_blank" style="
        display: flex; 
        align-items: center; 
        gap: 12px; 
        padding: 16px 30px; 
        background: #ea4335; /* Rojo Google */
        color: #ffffff; 
        border: 2px solid #ea4335; 
        border-radius: 8px; 
        font-family: inherit;
        font-weight: 600; 
        font-size: 16px; 
        text-decoration: none; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        transition: all 0.3s ease;
        text-transform: uppercase;
    " onmouseover="this.style.background='#ffffff'; this.style.color='#ea4335'; this.style.borderColor='#ea4335'; this.style.transform='translateY(-3px)'; this.style.boxShadow='0 8px 15px rgba(0,0,0,0.2)';" 
       onmouseout="this.style.background='#ea4335'; this.style.color='#ffffff'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0,0,0,0.1)';">
        <span style="font-size: 20px;">📍</span> Ubicación
    </a>

    <!-- Botón de Facebook (con el azul característico) -->
    <a href="https://www.facebook.com/profile.php?id=61591007356773" target="_blank" style="
        display: flex; 
        align-items: center; 
        gap: 12px; 
        padding: 16px 30px; 
        background: #1877f2; /* Azul Facebook */
        color: #ffffff; 
        border: 2px solid #1877f2; 
        border-radius: 8px; 
        font-family: inherit;
        font-weight: 600; 
        font-size: 16px; 
        text-decoration: none; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        transition: all 0.3s ease;
        text-transform: uppercase;
    " onmouseover="this.style.background='#ffffff'; this.style.color='#1877f2'; this.style.borderColor='#1877f2'; this.style.transform='translateY(-3px)'; this.style.boxShadow='0 8px 15px rgba(0,0,0,0.2)';" 
       onmouseout="this.style.background='#1877f2'; this.style.color='#ffffff'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0,0,0,0.1)';">
        <span style="font-size: 20px;">📘</span> Facebook
    </a>

    <!-- Botón de Instagram (con el degradado característico) -->
    <a href="https://www.instagram.com/tu_usuario" target="_blank" style="
        display: flex; 
        align-items: center; 
        gap: 12px; 
        padding: 16px 30px; 
        background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); /* Degradado Instagram */
        color: #ffffff; 
        border: none; /* Sin borde para el degradado */
        border-radius: 8px; 
        font-family: inherit;
        font-weight: 600; 
        font-size: 16px; 
        text-decoration: none; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        transition: all 0.3s ease;
        text-transform: uppercase;
    " onmouseover="this.style.background='linear-gradient(45deg, #bc1888 0%, #cc2366 25%, #dc2743 50%, #e6683c 75%, #f09433 100%)'; this.style.transform='translateY(-3px)'; this.style.boxShadow='0 8px 15px rgba(0,0,0,0.2)';" 
       onmouseout="this.style.background='linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%)'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0,0,0,0.1)';">
        <span style="font-size: 20px;">📸</span> Instagram
    </a>

</div>
