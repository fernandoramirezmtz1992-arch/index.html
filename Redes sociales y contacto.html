<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta con nosotros | Redes Sociales</title>
    <style>
        /* Estilos para el fondo vistoso y la página */
        body {
            margin: 0;
            padding: 0;
            font-family: inherit;
            /* Fondo con degradado moderno y textura sutil de red */
            background-color: #1a2530; /* Color de fondo base */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(43, 76, 126, 0.3) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(24, 119, 242, 0.3) 0%, transparent 20%),
                linear-gradient(135deg, #0f172a 0%, #1a2530 50%, #111827 100%);
            background-blend-mode: overlay, overlay, normal;
            /* Agregamos una textura muy tenue de "nodos y líneas" para el tema social */
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.762 0 5-2.238 5-5s-2.238-5-5-5-5 2.238-5 5 2.238 5 5 5zm42 67c2.762 0 5-2.238 5-5s-2.238-5-5-5-5 2.238-5 5 2.238 5 5 5zm-22-36c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm12 31c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM92 48c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm-45-6c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm40 46c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM93 67c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-40 7c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z'/%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        /* Título principal de la sección */
        .seccion-titulo {
            font-size: 3em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-weight: 800;
        }

        /* Subtítulo */
        .seccion-subtitulo {
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.8;
            max-width: 600px;
            text-align: center;
        }

        /* Contenedor principal de la botonera (los botones que ya tenías) */
        .botonera-contenedor {
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05); /* Fondo semitransparente para resaltar */
            backdrop-filter: blur(10px); /* Efecto de vidrio esmerilado */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Estilo base para los botones */
        .btn-social {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 35px;
            border-radius: 50px; /* Botones ovalados y muy fashion */
            font-family: inherit;
            font-weight: 600;
            font-size: 18px;
            text-decoration: none;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botón de Google Maps (con el rojo característico y hover) */
        .btn-maps {
            background: #ea4335; /* Rojo Google */
            color: #ffffff;
            border: 2px solid #ea4335;
        }
        .btn-maps:hover {
            background: #ffffff;
            color: #ea4335;
            border-color: #ea4335;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Botón de Facebook (con el azul característico y hover) */
        .btn-facebook {
            background: #1877f2; /* Azul Facebook */
            color: #ffffff;
            border: 2px solid #1877f2;
        }
        .btn-facebook:hover {
            background: #ffffff;
            color: #1877f2;
            border-color: #1877f2;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Botón de Instagram (con el degradado característico y hover) */
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); /* Degradado Instagram */
            color: #ffffff;
            border: none;
        }
        .btn-instagram:hover {
            background: linear-gradient(45deg, #bc1888 0%, #cc2366 25%, #dc2743 50%, #e6683c 75%, #f09433 100%); /* Degradado inverso */
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Ajustes para pantallas pequeñas (móviles) */
        @media (max-width: 768px) {
            .seccion-titulo { font-size: 2em; }
            .seccion-subtitulo { font-size: 1em; }
            .botonera-contenedor { gap: 15px; padding: 20px; }
            .btn-social { padding: 15px 25px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- Contenido de la página centrado -->
    <div class="seccion-titulo">Conecta</div>
    <div class="seccion-subtitulo">Encuentra nuestra ubicación y síguenos en nuestras redes sociales para estar al tanto de todas nuestras novedades.</div>

    <div class="botonera-contenedor">

        <!-- Botón de Google Maps -->
        <a href="https://maps.app.goo.gl/kNLUFbkkSp75gh7X8" target="_blank" class="btn-social btn-maps">
            <span style="font-size: 24px;">📍</span> Ubicación
        </a>

        <!-- Botón de Facebook -->
        <a href="https://www.facebook.com/profile.php?id=61591007356773" target="_blank" class="btn-social btn-facebook">
            <span style="font-size: 24px;">📘</span> Facebook
        </a>

        <!-- Botón de Instagram -->
        <a href="https://www.instagram.com/tu_usuario" target="_blank" class="btn-social btn-instagram">
            <span style="font-size: 24px;">📸</span> Instagram
        </a>

    </div>

</body>
</html>
